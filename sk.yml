---
- name: Prepare workstation for scaffolding
  hosts: workstation
  become: false
  gather_facts: false
  vars:
    the_user: student
  vars_files:
    - vars.yml
  tasks:
    - name: Configure SSH and Keys
      become: true
      become_user: "{{ the_user }}"
      block:
        - name: Create GitHub keys
          vars:
            the_key: "{{ github_keys | selectattr('type', '==', item) }}"
            the_key_content: "{{ the_key[0]['data'] }}"
            the_key_name: "{{ the_key[0]['name'] }}"
            the_key_mode: "{{ the_key[0]['mode'] }}"
          ansible.builtin.copy:
            content: "{{ the_key_content }}"
            dest: "~{{ the_user }}/.ssh/{{ the_key_name }}"
            #owner: "{{ the_user }}"
            #group: "{{ the_user }}"
            mode: "{{ the_key_mode }}"
            setype: ssh_home_t
          loop:
            - "private"
            - "public"
          loop_control:
            label: Creating the '~{{ the_user }}/.ssh/{{ the_key_name }}' GitHub file.

        - name: Update ~/.bash_profile
          ansible.builtin.blockinfile:
            path: "~{{ the_user }}/.bash_profile"
            marker: "# {mark} ANSIBLE MANAGED BLOCK GITHUB"
            block: "{{ lookup('template', 'templates/bash_profile.j2') }}"
            insertafter: EOF
            #owner: "{{ the_user }}"
            #group: "{{ the_user }}"
            #mode: '0644'
            state: present

        - name: Create ~{{ the_user }}/.ssh/config.d
          ansible.builtin.file:
            path: "~{{ the_user }}/.ssh/config.d"
            #owner: "{{ the_user }}"
            #group: "{{ the_user }}"
            #mode: '0775'
            state: directory

        - name: Add 'include' line to ~{{ the_user }}/.ssh/config
          ansible.builtin.lineinfile:
            path: "~{{ the_user }}/.ssh/config"
            regexp: '^[Ii]nclude'
            line: 'include ~/.ssh/config.d/*.conf'
            insertbefore: BOF
            state: present

        - name: Update SSH configuration for GitHub Host
          ansible.builtin.blockinfile:
            path: "~{{ the_user }}/.ssh/config.d/github.conf"
            marker: "# {mark} ANSIBLE MANAGED BLOCK GITHUB"
            block: "{{ lookup('template', 'templates/ssh_config.j2') }}"
            insertafter: EOF
            #owner: "{{ the_user }}"
            #group: "{{ the_user }}"
            #mode: '0644'
            create: true
            state: present
            setype: ssh_home_t

        - name: Configure Git to use SSH instead of HTTPS for GitHub
          ansible.builtin.command: git config --global --replace-all url."git@github.com:".insteadOf "https://github.com/"

        - name: Update ~/.ssh/config for wildcard Host
          ansible.builtin.lineinfile:
            path: "~{{ the_user }}/.ssh/config"
            regexp: '^Host .$'
            line: "Host * !github.com"
            state: present
